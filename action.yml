name: Hyperlocalise CI
description: Run opinionated Hyperlocalise localization CI checks.

branding:
  icon: check-circle
  color: gray-dark

inputs:
  check:
    description: "Check name. Supported values: 'drift' and 'check'."
    default: drift
  config-path:
    description: Optional path to the i18n config file.
    default: i18n.yml
  working-directory:
    description: Optional working directory for the check.
    default: .
  hyperlocalise-version:
    description: Hyperlocalise release version to install.
    default: latest
  fail-on-drift:
    description: Fail the action when drift is detected.
    default: "true"
  fail-on-findings:
    description: Fail the action when check findings are detected.
    default: "true"
  severity-threshold:
    description: "Minimum finding severity that should fail the action. Supported values: 'warning' and 'error'."
    default: warning
  upload-artifact:
    description: Upload the report and summary artifacts.
    default: "true"
  github-annotations:
    description: Emit inline GitHub workflow annotations for check findings when location data is available.
    default: "true"
  summary-format:
    description: "Control the GitHub job summary verbosity. Supported values: 'compact' and 'detailed'."
    default: compact
  summary-limit:
    description: "Maximum number of findings to render in the GitHub job summary."
    default: "20"

outputs:
  drift-detected:
    description: Whether the drift check found planned changes.
    value: ${{ steps.analyze.outputs.drift-detected }}
  findings-detected:
    description: Whether the check command found issues.
    value: ${{ steps.analyze.outputs.findings-detected }}
  cli-exit-code:
    description: Exit code returned by the Hyperlocalise CLI.
    value: ${{ steps.run-check.outputs.cli-exit-code }}
  report-path:
    description: Path to the generated JSON report.
    value: ${{ steps.prepare.outputs.report-path }}
  summary-path:
    description: Path to the generated text summary.
    value: ${{ steps.prepare.outputs.summary-path }}
  findings-total:
    description: Total number of errors and warnings reported by the action.
    value: ${{ steps.analyze.outputs.findings-total }}
  error-count:
    description: Number of error-level findings reported by the action.
    value: ${{ steps.analyze.outputs.error-count }}
  warning-count:
    description: Number of warning-level findings reported by the action.
    value: ${{ steps.analyze.outputs.warning-count }}

runs:
  using: composite
  steps:
    - name: Validate inputs
      shell: bash
      env:
        CHECK: ${{ inputs.check }}
        SEVERITY_THRESHOLD: ${{ inputs.severity-threshold }}
      run: |
        set -euo pipefail
        if [[ "${CHECK}" != "drift" && "${CHECK}" != "check" ]]; then
          echo "Unsupported check: ${CHECK}" >&2
          echo "Supported values are 'drift' and 'check'." >&2
          exit 1
        fi
        if [[ "${SEVERITY_THRESHOLD}" != "warning" && "${SEVERITY_THRESHOLD}" != "error" ]]; then
          echo "Unsupported severity threshold: ${SEVERITY_THRESHOLD}" >&2
          echo "Supported values are 'warning' and 'error'." >&2
          exit 1
        fi

    - name: Prepare artifact paths
      id: prepare
      shell: bash
      env:
        CHECK: ${{ inputs.check }}
      run: |
        set -euo pipefail
        artifact_dir="${RUNNER_TEMP}/hyperlocalise-ci/${GITHUB_RUN_ID}/${GITHUB_ACTION}"
        mkdir -p "${artifact_dir}"
        echo "artifact-dir=${artifact_dir}" >>"${GITHUB_OUTPUT}"
        echo "artifact-name=hyperlocalise-${CHECK}-${GITHUB_JOB}-${GITHUB_RUN_ATTEMPT}-$(date +%s)-${RANDOM}" >>"${GITHUB_OUTPUT}"
        echo "report-path=${artifact_dir}/${CHECK}-report.json" >>"${GITHUB_OUTPUT}"
        echo "summary-path=${artifact_dir}/${CHECK}-summary.txt" >>"${GITHUB_OUTPUT}"

    - name: Install Hyperlocalise
      shell: bash
      env:
        HYPERLOCALISE_VERSION: ${{ inputs.hyperlocalise-version }}
      run: |
        set -euo pipefail
        install_dir="${RUNNER_TEMP}/hyperlocalise-bin"
        mkdir -p "${install_dir}"
        bash "${GITHUB_ACTION_PATH}/tools/github-action/hyperlocalise-ci/scripts/install-hyperlocalise.sh" "${HYPERLOCALISE_VERSION}" "${install_dir}"
        echo "${install_dir}" >>"${GITHUB_PATH}"

    - name: Run localization check
      id: run-check
      shell: bash
      env:
        CHECK: ${{ inputs.check }}
        CONFIG_PATH: ${{ inputs.config-path }}
        WORKING_DIRECTORY: ${{ inputs.working-directory }}
        REPORT_PATH: ${{ steps.prepare.outputs.report-path }}
      run: |
        set +e
        set -u

        if [[ "${CHECK}" == "drift" ]]; then
          args=(run --dry-run --output "${REPORT_PATH}")
        else
          args=(check --no-fail --json-report "${REPORT_PATH}")
        fi
        if [[ -n "${CONFIG_PATH}" ]]; then
          args+=(--config "${CONFIG_PATH}")
        fi

        pushd "${WORKING_DIRECTORY}" >/dev/null
        hyperlocalise "${args[@]}"
        cli_exit=$?
        popd >/dev/null

        echo "cli-exit-code=${cli_exit}" >>"${GITHUB_OUTPUT}"
        exit 0

    - name: Analyze report
      id: analyze
      shell: bash
      env:
        CHECK_NAME: ${{ inputs.check }}
        CONFIG_PATH: ${{ inputs.config-path }}
        REPORT_PATH: ${{ steps.prepare.outputs.report-path }}
        SUMMARY_PATH: ${{ steps.prepare.outputs.summary-path }}
        CLI_EXIT_CODE: ${{ steps.run-check.outputs.cli-exit-code }}
        GITHUB_ANNOTATIONS_ENABLED: ${{ inputs.github-annotations }}
        SUMMARY_FORMAT: ${{ inputs.summary-format }}
        SUMMARY_LIMIT: ${{ inputs.summary-limit }}
      run: |
        set -euo pipefail
        node "${GITHUB_ACTION_PATH}/tools/github-action/hyperlocalise-ci/scripts/write-action-summary.mjs" \
          "${CHECK_NAME}" \
          "${CONFIG_PATH}" \
          "${REPORT_PATH}" \
          "${SUMMARY_PATH}" \
          "${CLI_EXIT_CODE}" \
          "${SUMMARY_FORMAT}" \
          "${SUMMARY_LIMIT}"

    - name: Upload artifacts
      if: ${{ inputs.upload-artifact == 'true' }}
      uses: actions/upload-artifact@v7
      with:
        name: ${{ steps.prepare.outputs.artifact-name }}
        if-no-files-found: error
        path: |
          ${{ steps.prepare.outputs.report-path }}
          ${{ steps.prepare.outputs.summary-path }}

    - name: Fail on CLI error
      if: ${{ steps.run-check.outputs.cli-exit-code != '0' }}
      shell: bash
      run: |
        set -euo pipefail
        echo "Hyperlocalise failed before a clean report could be produced." >&2
        exit 1

    - name: Fail on unknown result state
      if: ${{ (inputs.check == 'drift' && steps.analyze.outputs.drift-detected == 'unknown') || (inputs.check == 'check' && steps.analyze.outputs.findings-detected == 'unknown') }}
      shell: bash
      run: |
        set -euo pipefail
        echo "Hyperlocalise result state is unknown. Check the uploaded artifacts and workflow log." >&2
        exit 1

    - name: Fail on drift
      if: ${{ inputs.fail-on-drift == 'true' && steps.analyze.outputs.drift-detected == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        echo "Localization drift detected. Review the uploaded drift artifacts for details." >&2
        exit 1

    - name: Fail on findings
      if: ${{ inputs.check == 'check' && inputs.fail-on-findings == 'true' && steps.analyze.outputs.findings-detected == 'true' }}
      shell: bash
      env:
        SEVERITY_THRESHOLD: ${{ inputs.severity-threshold }}
        ERROR_COUNT: ${{ steps.analyze.outputs.error-count }}
        WARNING_COUNT: ${{ steps.analyze.outputs.warning-count }}
      run: |
        set -euo pipefail
        if [[ "${SEVERITY_THRESHOLD}" == "error" ]]; then
          if [[ "${ERROR_COUNT}" == "0" ]]; then
            exit 0
          fi
          echo "Localization check errors detected (${ERROR_COUNT} errors, ${WARNING_COUNT} warnings). Review the uploaded report artifacts for details." >&2
          exit 1
        fi

        echo "Localization check findings detected (${ERROR_COUNT} errors, ${WARNING_COUNT} warnings). Review the uploaded report artifacts for details." >&2
        exit 1
