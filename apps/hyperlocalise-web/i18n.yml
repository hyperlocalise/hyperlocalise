# Hyperlocalise sync config for the web app (react-intl / FormatJS).
locales:
  source: en-US
  targets:
    - zh-CN
    - vi-VN
    - de-DE
    - fr-FR

buckets:
  web:
    files:
      - from: lang/en-US.json
        to: lang/{{target}}.json
  blog:
    files:
      - from: _posts/en/**/*.md
        to: _posts/{{target}}/**/*.md

llm:
  profiles:
    default:
      provider: openai
      model: gpt-5.6-luna

hyperlocalise:
  project_id_env: HYPERLOCALISE_PROJECT_ID
  api_base_url: https://hyperlocalise.com/api
  api_key_env: HYPERLOCALISE_API_KEY
  timeout_seconds: 1200
