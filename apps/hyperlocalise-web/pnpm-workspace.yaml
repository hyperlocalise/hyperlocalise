allowBuilds:
  '@mongodb-js/zstd': false
  '@nestjs/core': false
  '@swc/core': false
  bun: true
  cbor-extract: false
  esbuild: false
  msw: false
  node-liblzma: false
  sharp: false
catalog:
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@^0.1.15
ignoredBuiltDependencies:
  - sharp
  - unrs-resolver
overrides:
  vite: "8.0.14"
  vitest: "catalog:"
  # Pin each undici major independently (transitive deps use 6/7/8).
  "undici@^6.0.0": "6.26.0"
  "undici@^7.0.0": "7.26.0"
  "undici@^8.0.0": "8.3.0"
  devalue: "5.8.1"
  qs: "6.15.2"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
