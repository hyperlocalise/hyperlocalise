allowBuilds:
  '@mongodb-js/zstd': false
  '@nestjs/core': false
  '@swc/core': false
  bun: true
  cbor-extract: false
  esbuild: false
  msw: false
  node-liblzma: false
  sharp: false
catalog:
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
ignoredBuiltDependencies:
  - sharp
  - unrs-resolver
overrides:
  vite: "8.1.5"
  # Pin each undici major independently (transitive deps use 6/7/8).
  "undici@^6.0.0": "6.27.0"
  "undici@^7.0.0": "7.28.0"
  "undici@^8.0.0": "8.7.0"
  devalue: "5.8.1"
  qs: "6.15.3"
  "@anthropic-ai/sdk": "0.112.3"
  postcss: "8.5.20"
  esbuild: "0.28.1"
  "ip-address": "10.2.0"
  hono: "4.12.31"
  form-data: "4.0.6"
  dompurify: "3.4.12"
  "js-yaml@^3.0.0": "4.3.0"
  "js-yaml@^4.0.0": "4.3.0"
  # TipTap 3.28 pulls prosemirror-model ^1.25.9 while nested PM packages
  # still resolve 1.25.8; dual copies break editor Fragment identity.
  prosemirror-model: "1.25.11"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
