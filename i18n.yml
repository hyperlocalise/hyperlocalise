# Minimal starter config.
# Read this file top-to-bottom: locales -> buckets -> groups -> llm.
locales:
  # Source locale: the language your original content is written in.
  source: en-US
  # Target locales: one output is generated per locale listed here.
  # Add more locales as your project grows.
  targets:
    - zh-CN
    - vi-VN

# One bucket defines how files map from source to target.
# Use {{source}} and {{target}} placeholders in paths.
# Buckets are reusable: multiple groups can reference the same bucket.
buckets:
  # Bucket name is arbitrary; choose a name that matches your domain.
  docs:
    files:
      - # Input path template (e.g. docs/getting-started/quickstart.mdx).
        from: docs/**/*.mdx
        # Output path template (e.g. docs/zh-CN/getting-started/quickstart.mdx when target=zh-CN).
        to: docs/{{localeDir}}/**/*.mdx
  tests_json:
    files:
      - from: tests/json/en-US.json
        to: tests/json/[locale].json
  tests_jsonc:
    files:
      - from: tests/jsonc/en-US.jsonc
        to: tests/jsonc/[locale].jsonc
  tests_arb:
    files:
      - from: tests/arb/en-US.arb
        to: tests/arb/[locale].arb
  tests_formatjs:
    files:
      - from: tests/formatjs/en-US.json
        to: tests/formatjs/[locale].json
  tests_xlf:
    files:
      - from: tests/xlf/en-US.xlf
        to: tests/xlf/[locale].xlf
  tests_xlif:
    files:
      - from: tests/xlif/en-US.xlif
        to: tests/xlif/[locale].xlif
  tests_xliff:
    files:
      - from: tests/xliff/en-US.xliff
        to: tests/xliff/[locale].xliff
  tests_po:
    files:
      - from: tests/po/en-US.po
        to: tests/po/[locale].po
  tests_html:
    files:
      - from: tests/html/en-US.html
        to: tests/html/[locale].html
  tests_md:
    files:
      - from: tests/md/en-US.md
        to: tests/md/[locale].md
  tests_mdx:
    files:
      - from: tests/mdx/en-US.mdx
        to: tests/mdx/[locale].mdx
  tests_strings:
    files:
      - from: tests/strings/en-US.strings
        to: tests/strings/[locale].strings
  tests_stringsdict:
    files:
      - from: tests/stringsdict/en-US.stringsdict
        to: tests/stringsdict/[locale].stringsdict
  tests_csv:
    files:
      - from: tests/csv/en-US.csv
        to: tests/csv/[locale].csv

# One group links the target(s) with the bucket(s).
# Think of a group as "what to run" for a subset of locales/files.
groups:
  default:
    # Targets in this group (must be a subset of locales.targets).
    targets:
      - zh-CN
      - vi-VN
    # Buckets in this group (names must match keys under buckets).
    buckets:
      - docs
  tests:
    targets:
      - zh-CN
      - vi-VN
    buckets:
      - tests_arb
      - tests_json
      - tests_jsonc
      - tests_formatjs
      - tests_xlf
      - tests_xlif
      - tests_xliff
      - tests_po
      - tests_html
      - tests_md
      - tests_mdx
      - tests_strings
      - tests_stringsdict
      - tests_csv

llm:
  # When set, this provider/model pair is used only for context-memory building.
  context_memory:
    provider: openai
    model: "gpt-5.4-mini"
  # Profiles define provider/model and optional prompt behavior.
  # A default profile is required.
  # Supported providers: openai, azure_openai, anthropic, gemini, bedrock, lmstudio, groq, ollama.
  # Available vars: {{source}}, {{target}}, {{input}}.
  profiles:
    default:
      # Provider: openai, azure_openai, anthropic, gemini, bedrock, lmstudio, groq, or ollama.
      provider: openai
      model: gpt-5.4-mini
      # Optional explicit system message template.
      # system_prompt: You are a senior localization expert.
      # Optional explicit user message template.
      # user_prompt: |-
      #   Translate from {{source}} to {{target}}:
      #
      #   {{input}}
      # Deprecated legacy prompt template (use system_prompt/user_prompt instead).
      # prompt: |-
      #   Translate from {{source}} to {{target}}:
      #
      #   {{input}}
    ollama:
      provider: ollama
      model: translategemma
      # Deprecated legacy prompt template (optional fallback).
      # prompt: |-
      #   Translate from {{source}} to {{target}}:
      #
      #   {{input}}
  # Rules connect groups to profiles. If multiple rules match, the highest priority wins.
  rules:
    - priority: 100
      group: default
      profile: default
    - priority: 200
      group: tests
      profile: ollama

# Optional remote caching client config for the run pipeline.
# cache:
#   enabled: true
#   endpoint: dns:///cache.internal:443
#   project_key_env: HYPERLOCALISE_CACHE_PROJECT_KEY
#   timeout_seconds: 5
