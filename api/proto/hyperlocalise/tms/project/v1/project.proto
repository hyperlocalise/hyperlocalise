syntax = "proto3";

package hyperlocalise.tms.project.v1;

option go_package = "github.com/quiet-circles/hyperlocalise/pkg/api/proto/hyperlocalise/tms/project/v1;projectv1";

import "hyperlocalise/common/v1/common.proto";

service ProjectService {
  rpc ListProjects(ListProjectsRequest) returns (ListProjectsResponse);
}

message Project {
  string id = 1;
  string key = 2;
  string name = 3;
  string source_locale = 4;
  repeated string target_locales = 5;
}

message ListProjectsRequest {
  hyperlocalise.common.v1.PageRequest page = 1;
}

message ListProjectsResponse {
  repeated Project items = 1;
  hyperlocalise.common.v1.PageResponse page = 2;
}
