syntax = "proto3";

package hyperlocalise.tms.workflow.v1;

option go_package = "github.com/quiet-circles/hyperlocalise/pkg/api/proto/hyperlocalise/tms/workflow/v1;workflowv1";

import "hyperlocalise/common/v1/common.proto";

service WorkflowService {
  rpc ListWorkflows(ListWorkflowsRequest) returns (ListWorkflowsResponse);
}

message Workflow {
  string id = 1;
  string name = 2;
  string state = 3;
}

message ListWorkflowsRequest {
  hyperlocalise.common.v1.PageRequest page = 1;
}

message ListWorkflowsResponse {
  repeated Workflow items = 1;
  hyperlocalise.common.v1.PageResponse page = 2;
}
