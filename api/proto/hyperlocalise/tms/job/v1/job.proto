syntax = "proto3";

package hyperlocalise.tms.job.v1;

option go_package = "github.com/quiet-circles/hyperlocalise/pkg/api/proto/hyperlocalise/tms/job/v1;jobv1";

import "hyperlocalise/common/v1/common.proto";

service JobService {
  rpc ListJobs(ListJobsRequest) returns (ListJobsResponse);
  rpc CreateJob(CreateJobRequest) returns (Job);
}

message Job {
  string id = 1;
  string kind = 2;
  string status = 3;
  string project_id = 4;
  string created_at = 5;
}

message ListJobsRequest {
  hyperlocalise.common.v1.PageRequest page = 1;
}

message ListJobsResponse {
  repeated Job items = 1;
  hyperlocalise.common.v1.PageResponse page = 2;
}

message CreateJobRequest {
  string project_id = 1;
  string kind = 2;
  repeated string resource_ids = 3;
}
