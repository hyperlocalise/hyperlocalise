services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: hyperlocalise
      POSTGRES_USER: hyperlocalise
      POSTGRES_PASSWORD: hyperlocalise
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hyperlocalise -d hyperlocalise"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres18-data:/var/lib/postgresql

volumes:
  postgres18-data:
