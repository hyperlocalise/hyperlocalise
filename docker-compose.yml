services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: hyperlocalise
      POSTGRES_USER: hyperlocalise
      POSTGRES_PASSWORD: hyperlocalise
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hyperlocalise -d hyperlocalise"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres-data:/var/lib/postgresql/data

  inngest:
    image: inngest/inngest:v1.17.9
    command:
      - inngest
      - dev
      - --host=0.0.0.0
      - --port=8288
      - --url=http://host.docker.internal:3000/api/inngest
    ports:
      - "8288:8288"
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres-data:
