name: Go bootstrap
description: Setup Go toolchain and bootstrap deps
inputs:
  go-version-file:
    description: Path to the go.mod file
    default: go.mod
runs:
  using: composite
  steps:
    - name: Setup Go
      uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
      with:
        go-version-file: ${{ inputs.go-version-file }}
        cache: true
    - name: Bootstrap dependencies
      run: make bootstrap
      shell: bash
