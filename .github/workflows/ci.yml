name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Bootstrap Go toolchain
        uses: ./.github/actions/go-bootstrap
        with:
          go-version-file: go.mod

      - name: make precommit
        run: make precommit

      - name: make bench-runsvc
        run: make bench-runsvc
