name: CI

on:
  pull_request:
    paths-ignore:
      - apps/hyperlocalise-web/**
      - .github/workflows/web.yml
  push:
    branches:
      - main
    paths-ignore:
      - apps/hyperlocalise-web/**
      - .github/workflows/web.yml

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  action-self-test:
    name: Action Self Test
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Run Hyperlocalise action
        id: hyperlocalise
        uses: ./
        with:
          check: check
          config-path: i18n.yml
          fail-on-findings: false
          upload-artifact: false

      - name: Verify action outputs
        shell: bash
        env:
          CLI_EXIT_CODE: ${{ steps.hyperlocalise.outputs.cli-exit-code }}
          FINDINGS_DETECTED: ${{ steps.hyperlocalise.outputs.findings-detected }}
          FINDINGS_TOTAL: ${{ steps.hyperlocalise.outputs.findings-total }}
          ERROR_COUNT: ${{ steps.hyperlocalise.outputs.error-count }}
          WARNING_COUNT: ${{ steps.hyperlocalise.outputs.warning-count }}
        run: |
          set -euo pipefail
          test "${CLI_EXIT_CODE}" = "0"
          case "${FINDINGS_DETECTED}" in
            true|false) ;;
            *)
              echo "Unexpected findings-detected output: ${FINDINGS_DETECTED}" >&2
              exit 1
              ;;
          esac
          [[ "${FINDINGS_TOTAL}" =~ ^[0-9]+$ ]]
          [[ "${ERROR_COUNT}" =~ ^[0-9]+$ ]]
          [[ "${WARNING_COUNT}" =~ ^[0-9]+$ ]]

  web-sync-cli-smoke-test:
    name: Web Sync CLI Smoke Test
    runs-on: blacksmith-4vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: apps/hyperlocalise-web
    env:
      HYPERLOCALISE_API_KEY: hl_sync_self_test
      HYPERLOCALISE_PROJECT_ID: project_sync_self_test

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Install Hyperlocalise
        uses: ./install
        with:
          version: 1.8.24

      - name: Dry-run sync push
        run: hl sync push --dry-run

      - name: Dry-run sync pull
        run: hl sync pull --dry-run

      - name: Pack locale catalogs
        run: hl pack

  bazel-build-test:
    name: Bazel Build/Test
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@b39c379c82683a5f25d34f0d062761f62693e0b2 # v3

      # Blacksmith injects --remote_cache when Bazel Build Caching is enabled.
      # Do not set an explicit --remote_cache here; it would take precedence.
      - name: Bazel build
        run: bazel build --config=ci //:cli

      - name: Bazel test
        run: bazel test --config=ci //apps/cli/cmd:cmd_test

  go-quality:
    name: Go Quality
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Bootstrap Go toolchain
        uses: ./.github/actions/go-bootstrap
        with:
          go-version-file: go.mod

      - name: Verify formatting
        run: |
          make fmt
          git diff --exit-code

      - name: Lint
        run: make lint

      - name: Workspace tests
        run: make test-workspace

      - name: Check builds
        run: make check-build
