name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  action-self-test:
    name: Action Self Test
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Hyperlocalise action
        id: hyperlocalise
        uses: ./
        with:
          check: check
          config-path: i18n.jsonc
          fail-on-findings: false
          upload-artifact: false

      - name: Verify action outputs
        shell: bash
        env:
          CLI_EXIT_CODE: ${{ steps.hyperlocalise.outputs.cli-exit-code }}
          FINDINGS_DETECTED: ${{ steps.hyperlocalise.outputs.findings-detected }}
          FINDINGS_TOTAL: ${{ steps.hyperlocalise.outputs.findings-total }}
          ERROR_COUNT: ${{ steps.hyperlocalise.outputs.error-count }}
          WARNING_COUNT: ${{ steps.hyperlocalise.outputs.warning-count }}
        run: |
          set -euo pipefail
          test "${CLI_EXIT_CODE}" = "0"
          case "${FINDINGS_DETECTED}" in
            true|false) ;;
            *)
              echo "Unexpected findings-detected output: ${FINDINGS_DETECTED}" >&2
              exit 1
              ;;
          esac
          [[ "${FINDINGS_TOTAL}" =~ ^[0-9]+$ ]]
          [[ "${ERROR_COUNT}" =~ ^[0-9]+$ ]]
          [[ "${WARNING_COUNT}" =~ ^[0-9]+$ ]]

  hyperlocalise-web-build:
    name: Hyperlocalise Web Build
    runs-on: blacksmith-4vcpu-ubuntu-2404
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: hyperlocalise
          POSTGRES_USER: hyperlocalise
          POSTGRES_PASSWORD: hyperlocalise
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hyperlocalise -d hyperlocalise"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
      inngest:
        image: inngest/inngest:v1.17.5
        ports:
          - 8288:8288
        options: >-
          --add-host=host.docker.internal:host-gateway
        command:
          - inngest
          - dev
          - --host=0.0.0.0
          - --port=8288
          - --sdk-url=http://host.docker.internal:3000/api/inngest
    env:
      DATABASE_URL: postgres://hyperlocalise:hyperlocalise@127.0.0.1:5432/hyperlocalise?sslmode=disable
      INNGEST_DEV_URL: http://127.0.0.1:8288
    defaults:
      run:
        working-directory: apps/hyperlocalise-web

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - name: Install hyperlocalise-web dependencies
        run: vp install --frozen-lockfile

      - name: Migrate hyperlocalise-web database
        run: vp run db:migrate

      - name: Check hyperlocalise-web
        run: vp check

      - name: Test hyperlocalise-web
        run: vp test

      - name: Build hyperlocalise-web
        run: vp run build

  bazel-build-test:
    name: Bazel Build/Test
    runs-on: blacksmith-4vcpu-ubuntu-2404
    env:
      BUILDBUDDY_ENDPOINT: grpcs://remote.buildbuddy.io
      BUILDBUDDY_RESULTS_URL: https://app.buildbuddy.io/invocation/

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Configure BuildBuddy
        id: buildbuddy
        shell: bash
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        run: |
          rc_path="$RUNNER_TEMP/buildbuddy.bazelrc"
          if [[ -n "${BUILDBUDDY_API_KEY}" ]]; then
            printf '%s\n' \
              "common --bes_backend=${BUILDBUDDY_ENDPOINT}" \
              "common --bes_results_url=${BUILDBUDDY_RESULTS_URL}" \
              "common --remote_cache=${BUILDBUDDY_ENDPOINT}" \
              "common --remote_timeout=10m" \
              "common --remote_header=x-buildbuddy-api-key=${BUILDBUDDY_API_KEY}" \
              >"${rc_path}"
            echo "extra_bazelrc=--bazelrc=${rc_path}" >>"${GITHUB_OUTPUT}"
          else
            echo "extra_bazelrc=" >>"${GITHUB_OUTPUT}"
            echo "BuildBuddy secret unavailable; continuing with local-only Bazel execution."
          fi

      - name: Bazel build
        run: bazel ${{ steps.buildbuddy.outputs.extra_bazelrc }} build --config=ci //:cli

      - name: Bazel test
        run: bazel ${{ steps.buildbuddy.outputs.extra_bazelrc }} test --config=ci //apps/cli/cmd:cmd_test

  go-quality:
    name: Go Quality
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Bootstrap Go toolchain
        uses: ./.github/actions/go-bootstrap
        with:
          go-version-file: go.mod

      - name: Verify formatting
        run: |
          make fmt
          git diff --exit-code

      - name: Lint
        run: make lint

      - name: Workspace tests
        run: make test-workspace

      - name: Check builds
        run: make check-build
