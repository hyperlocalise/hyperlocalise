name: Web CI

on:
  pull_request:
    paths:
      - apps/hyperlocalise-web/**
      - .github/workflows/web.yml
  push:
    branches:
      - main
    paths:
      - apps/hyperlocalise-web/**
      - .github/workflows/web.yml

permissions:
  contents: read

concurrency:
  group: web-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hyperlocalise-web-build:
    name: Hyperlocalise Web Build
    runs-on: blacksmith-4vcpu-ubuntu-2404
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: hyperlocalise
          POSTGRES_USER: hyperlocalise
          POSTGRES_PASSWORD: hyperlocalise
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hyperlocalise -d hyperlocalise"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      CI: "true"
      DATABASE_URL: postgres://hyperlocalise:hyperlocalise@127.0.0.1:5432/hyperlocalise?sslmode=disable
      NEXT_PUBLIC_WAITLIST_URL: https://example.com/waitlist
      NEXT_PUBLIC_WORKOS_REDIRECT_URI: http://localhost:3000/auth/callback
      GITHUB_APP_WEBHOOK_SECRET: your-github-app-webhook-secret
      WORKOS_API_KEY: your-workos-api-key
      WORKOS_CLIENT_ID: client_your_workos_client_id
      WORKOS_REDIRECT_URI: http://localhost:3000/auth/callback
      WORKOS_COOKIE_PASSWORD: replace-with-a-random-32-character-secret
      WORKOS_WEBHOOK_SECRET: your-workos-webhook-secret
      MCP_AUTH_ENABLED: "true"
      MCP_TOKEN_LIFETIME_MINUTES: "60"
      MCP_REFRESH_TOKEN_LIFETIME_DAYS: "30"
      MCP_ENCRYPTION_KEY: base64-encoded-32-byte-key
      SLACK_BOT_TOKEN: xoxb-your-slack-bot-token
      SLACK_SIGNING_SECRET: your-slack-signing-secret
    defaults:
      run:
        working-directory: apps/hyperlocalise-web

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - name: Install hyperlocalise-web dependencies
        run: vp install --frozen-lockfile

      - name: Check for Drizzle migration collisions
        run: |
          set -euo pipefail
          duplicate_idx=$(grep -oE '"idx":[[:space:]]*[0-9]+' drizzle/meta/_journal.json | sort | uniq -d || true)
          if [ -n "${duplicate_idx}" ]; then
            echo "::error::Duplicate idx in drizzle/meta/_journal.json (likely a merge from parallel branches that each generated the same migration number):"
            echo "${duplicate_idx}"
            echo "Resolve by deleting your migration files, rebasing onto main, and rerunning 'vp run db:generate'."
            exit 1
          fi
          duplicate_prefix=$(ls drizzle/*.sql 2>/dev/null | xargs -n1 basename | cut -c1-5 | sort | uniq -d || true)
          if [ -n "${duplicate_prefix}" ]; then
            echo "::error::Duplicate migration index prefix in drizzle/ (likely a merge from parallel branches):"
            echo "${duplicate_prefix}"
            echo "Resolve by deleting your migration files, rebasing onto main, and rerunning 'vp run db:generate'."
            exit 1
          fi

      - name: Check for Drizzle migration drift
        run: |
          set -euo pipefail
          vp run db:generate
          if [ -n "$(git status --porcelain drizzle)" ]; then
            echo "::error::Drizzle schema and migrations are out of sync."
            echo "Run 'vp run db:generate' locally and commit the generated files."
            git status --porcelain drizzle
            git --no-pager diff -- drizzle
            exit 1
          fi

      - name: Migrate hyperlocalise-web database
        run: vp run db:migrate

      - name: Check hyperlocalise-web
        run: vp check

      - name: Test hyperlocalise-web
        run: vp test

      - name: Build hyperlocalise-web
        run: vp run build
